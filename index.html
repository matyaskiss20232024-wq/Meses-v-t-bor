<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meseszövő Tábor — Galéria</title>
<style>
  :root{
    --paper:#fbf6ec;
    --ink:#2b2620;
    --sun:#e8a33d;
    --leaf:#4f7a5c;
    --clay:#c0603f;
    --line:#e2d8c3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Georgia', 'Iowan Old Style', serif;
    line-height:1.5;
  }
  header{
    padding:56px 20px 36px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  header .eyebrow{
    font-family:'Trebuchet MS', sans-serif;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:.72rem;
    color:var(--leaf);
    margin-bottom:10px;
  }
  header h1{
    margin:0;
    font-size:clamp(2rem, 5vw, 3.1rem);
    font-weight:400;
    letter-spacing:.01em;
  }
  header p{
    font-family:'Trebuchet MS', sans-serif;
    color:#6b6355;
    font-size:.95rem;
    margin-top:10px;
  }
  main{
    max-width:1100px;
    margin:0 auto;
    padding:40px 20px 80px;
  }

  /* --- mappa nézet --- */
  .folder-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:24px;
  }
  .folder-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:34px 20px;
    text-align:center;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    font-family:'Trebuchet MS', sans-serif;
  }
  .folder-card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 24px rgba(43,38,32,.10);
  }
  .folder-icon{
    font-size:2.4rem;
    margin-bottom:10px;
  }
  .folder-card h2{
    margin:0 0 4px;
    font-family:'Georgia', serif;
    font-size:1.5rem;
    font-weight:400;
  }
  .folder-card .count{
    color:#8a8172;
    font-size:.8rem;
  }
  .folder-card.empty{
    opacity:.55;
    cursor:default;
  }

  /* --- galéria nézet --- */
  .gallery-header{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:26px;
    font-family:'Trebuchet MS', sans-serif;
  }
  .back-btn{
    background:none;
    border:1px solid var(--leaf);
    color:var(--leaf);
    padding:7px 14px;
    border-radius:20px;
    cursor:pointer;
    font-size:.85rem;
    font-family:'Trebuchet MS', sans-serif;
    transition:background .15s ease, color .15s ease;
  }
  .back-btn:hover{
    background:var(--leaf);
    color:#fff;
  }
  .gallery-header h2{
    margin:0;
    font-family:'Georgia', serif;
    font-weight:400;
    font-size:1.7rem;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
    gap:22px;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 24px rgba(43,38,32,.10);
  }
  .thumb{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:#efe8d6;
    cursor:pointer;
    overflow:hidden;
  }
  .thumb img, .thumb video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .badge{
    position:absolute;
    top:8px;
    left:8px;
    background:var(--clay);
    color:#fff;
    font-family:'Trebuchet MS', sans-serif;
    font-size:.65rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:3px;
  }
  .card-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    font-family:'Trebuchet MS', sans-serif;
  }
  .card-foot .name{
    font-size:.72rem;
    color:#8a8172;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .dl{
    flex-shrink:0;
    margin-left:8px;
    display:inline-flex;
    align-items:center;
    gap:5px;
    text-decoration:none;
    font-size:.75rem;
    color:var(--leaf);
    border:1px solid var(--leaf);
    padding:5px 10px;
    border-radius:20px;
    transition:background .15s ease, color .15s ease;
  }
  .dl:hover{
    background:var(--leaf);
    color:#fff;
  }
  /* lightbox */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(20,18,14,.92);
    display:none;
    align-items:center;
    justify-content:center;
    padding:30px;
    z-index:50;
  }
  .lightbox.open{display:flex;}
  .lightbox-inner{
    max-width:min(90vw, 1000px);
    max-height:85vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }
  .lightbox img, .lightbox video{
    max-width:100%;
    max-height:70vh;
    border-radius:4px;
  }
  .lightbox .close{
    position:absolute;
    top:20px;
    right:28px;
    color:#fbf6ec;
    font-size:2rem;
    background:none;
    border:none;
    cursor:pointer;
    line-height:1;
  }
  .lightbox .dl{
    color:var(--paper);
    border-color:var(--paper);
  }
  .lightbox .dl:hover{
    background:var(--paper);
    color:var(--ink);
  }
  .empty-msg{
    font-family:'Trebuchet MS', sans-serif;
    color:#8a8172;
    text-align:center;
    padding:60px 20px;
  }
  footer{
    text-align:center;
    padding:30px 20px 50px;
    font-family:'Trebuchet MS', sans-serif;
    font-size:.8rem;
    color:#9a917f;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Meseszövő tábor</div>
  <h1>Nyári emlékek</h1>
  <p id="subtitle">Válassz egy mappát a képek és videók megtekintéséhez.</p>
</header>

<main>
  <div id="folderView" class="folder-grid"></div>
  <div id="galleryView" style="display:none;">
    <div class="gallery-header">
      <button class="back-btn" id="backBtn">← Vissza a mappákhoz</button>
      <h2 id="galleryTitle"></h2>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</main>

<div class="lightbox" id="lightbox">
  <button class="close" id="closeBtn" aria-label="Bezárás">&times;</button>
  <div class="lightbox-inner" id="lightboxInner"></div>
</div>

<footer>© Meseszövő tábor galéria</footer>

<script>
  const folders = {
    "2026": [
      "20260703_102807.jpg",
      "20260703_103435.jpg",
      "20260703_104055.jpg",
      "20260703_104113.jpg",
      "20260703_104119.jpg",
      "20260703_104259.jpg",
      "20260703_104449.jpg",
      "20260703_104843.jpg",
      "20260703_105034.jpg",
      "20260703_105035.jpg",
      "20260703_105506.jpg",
      "20260703_105707.jpg",
      "20260703_105756.jpg",
      "20260703_105913.jpg",
      "20260703_110204.jpg",
      "20260703_110228.jpg",
      "20260703_110230.jpg",
      "20260703_110244.jpg",
      "20260703_154950.jpg",
      "20260703_154954.jpg"
    ],
    "2027": [
      // ide kerülnek majd a 2027-es fájlnevek, pl. "20270703_120000.jpg"
    ]
  };

  const folderView = document.getElementById('folderView');
  const galleryView = document.getElementById('galleryView');
  const grid = document.getElementById('grid');
  const galleryTitle = document.getElementById('galleryTitle');
  const subtitle = document.getElementById('subtitle');
  const backBtn = document.getElementById('backBtn');
  const lightbox = document.getElementById('lightbox');
  const lightboxInner = document.getElementById('lightboxInner');
  const closeBtn = document.getElementById('closeBtn');

  function isVideo(name){
    return name.toLowerCase().endsWith('.mp4');
  }

  // --- mappa kártyák felépítése ---
  function buildFolderView(){
    folderView.innerHTML = '';
    Object.keys(folders).forEach(folderName => {
      const items = folders[folderName];
      const card = document.createElement('div');
      card.className = 'folder-card' + (items.length === 0 ? ' empty' : '');

      const icon = document.createElement('div');
      icon.className = 'folder-icon';
      icon.textContent = '📁';

      const title = document.createElement('h2');
      title.textContent = folderName;

      const count = document.createElement('div');
      count.className = 'count';
      count.textContent = items.length === 0 ? 'nincs feltöltve fájl' : `${items.length} fájl`;

      card.appendChild(icon);
      card.appendChild(title);
      card.appendChild(count);

      if(items.length > 0){
        card.addEventListener('click', () => openFolder(folderName));
      }

      folderView.appendChild(card);
    });
  }

  function openFolder(folderName){
    const items = folders[folderName];
    galleryTitle.textContent = folderName;
    subtitle.textContent = `${folderName} mappa — kattints egy elemre a nagyításhoz, vagy a letöltés gombra a mentéshez.`;
    grid.innerHTML = '';

    if(items.length === 0){
      const msg = document.createElement('div');
      msg.className = 'empty-msg';
      msg.textContent = 'Ebben a mappában még nincs fájl.';
      grid.appendChild(msg);
    } else {
      items.forEach(name => {
        const path = `${folderName}/${name}`;
        grid.appendChild(buildCard(path, name));
      });
    }

    folderView.style.display = 'none';
    galleryView.style.display = 'block';
  }

  function buildCard(path, name){
    const video = isVideo(name);

    const card = document.createElement('div');
    card.className = 'card';

    const thumb = document.createElement('div');
    thumb.className = 'thumb';

    if(video){
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = 'Videó';
      thumb.appendChild(badge);

      const v = document.createElement('video');
      v.src = path;
      v.muted = true;
      v.playsInline = true;
      v.preload = 'metadata';
      thumb.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = path;
      img.loading = 'lazy';
      img.alt = name;
      thumb.appendChild(img);
    }

    thumb.addEventListener('click', () => openLightbox(path, name, video));

    const foot = document.createElement('div');
    foot.className = 'card-foot';

    const nameEl = document.createElement('span');
    nameEl.className = 'name';
    nameEl.textContent = name;

    const dl = document.createElement('a');
    dl.className = 'dl';
    dl.href = path;
    dl.download = name;
    dl.textContent = '⬇ Letöltés';

    foot.appendChild(nameEl);
    foot.appendChild(dl);

    card.appendChild(thumb);
    card.appendChild(foot);
    return card;
  }

  function openLightbox(path, name, video){
    lightboxInner.innerHTML = '';

    const media = document.createElement(video ? 'video' : 'img');
    media.src = path;
    if(video){
      media.controls = true;
      media.autoplay = true;
    } else {
      media.alt = name;
    }
    lightboxInner.appendChild(media);

    const dl = document.createElement('a');
    dl.className = 'dl';
    dl.href = path;
    dl.download = name;
    dl.textContent = '⬇ Letöltés eredeti méretben';
    lightboxInner.appendChild(dl);

    lightbox.classList.add('open');
  }

  closeBtn.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });
  function closeLightbox(){
    lightbox.classList.remove('open');
    lightboxInner.innerHTML = '';
  }

  backBtn.addEventListener('click', () => {
    galleryView.style.display = 'none';
    folderView.style.display = 'grid';
    subtitle.textContent = 'Válassz egy mappát a képek és videók megtekintéséhez.';
  });

  buildFolderView();
</script>

</body>
</html>
